<!DOCTYPE html>
<html lang="en">

<head>
    <title>2048</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0 shrink-to-fit=no">
    <link rel="shortcut icon" type="x-icon" href="2048.png">
    <link rel="stylesheet" href="2048.css">
</head>

<body style="touch-action: none;">
    <div class="title">
        <h1 class="head">2048</h1>
        <div class="scores-improv">
            <div class="Best-score">
                <h1>Best Score</h1>
                <h1 id="Best-score">0</h1>
            </div>
            <div class="score">
                <h1>Score</h1>
                <h1 id="score">0</h1>
            </div>
        </div>
    </div>
    <div class="merge">
        <div class="grid-container" id="Container">
            <div class="item"></div>
            <div class="item"></div>
            <div class="item"></div>
            <div class="item"></div>
            <div class="item"></div>
            <div class="item"></div>
            <div class="item"></div>
            <div class="item"></div>
            <div class="item"></div>
            <div class="item"></div>
            <div class="item"></div>
            <div class="item"></div>
            <div class="item"></div>
            <div class="item"></div>
            <div class="item"></div>
            <div class="item"></div>
        </div>
        <div class="result">
            <h1 class="font-result">You Lose</h1>
            <div class="play-button"><button class="play-again">
                    <h3 id="play">Try Again</h3>
                </button></div>
        </div>
    </div>
    <div class="milestone-card" id="milestone-card" aria-live="polite" aria-atomic="true">
        <h2 id="milestone-title">🎉 2048 reached!</h2>
        <p id="milestone-message">Awesome move! Keep going until no more moves are possible.</p>
        <button id="continue-play" type="button">Continue</button>
    </div>
    <div class="bottom">
        <div><span class="h3">How to play:</span>
            <span class="instruct">Use your <span class="bold">arrow keys</span> to move the tiles. Tiles with the
                same value merge together. Reach <span class="bold">2048</span> for a celebration, then keep going until
                you run out of moves.
            </span>
        </div>
    </div>
    <div class="reset-container">
        <button class="reset" id="reset">
            <h2>New Game</h2>
        </button>
        <div class="theme-switcher">
            <label for="theme-select">Theme</label>
            <select id="theme-select" aria-label="Select game theme">
                <option value="classic">Classic</option>
                <option value="dark">Dark</option>
                <option value="ocean">Ocean</option>
            </select>
        </div>
        <button id="undo">Undo</button>
    </div>
    <div class="links">
        <a href="https://github.com/yuvrajsinh5252" target="_blank"><img
                src="https://img.icons8.com/glyph-neue/64/null/github.png" /></a>
        <a href="https://www.linkedin.com/in/yuvrajsinh-gohil-015623258/" target="_blank"><img
                src="https://img.icons8.com/windows/64/null/linkedin.png" /></a>
        <a href="https://x.com/Yuvrajsinh_099" target="_blank"><img
                src="https://img.icons8.com/?size=100&id=7WVpwSy9g6hn&format=png&color=000000" /></a>
        <a href="" target="_blank"><img
                src="https://img.icons8.com/?size=100&id=yA7GkItBEg7F&format=png&color=000000" /></a>
    </div>
    <script src="2048.js"></script>
</body>

</html>
